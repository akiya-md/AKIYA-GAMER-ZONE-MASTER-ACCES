<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akiya Gamer Zone | Admin Control Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff003c;
            --secondary: #00ff66;
            --bg-dark: #0a0a0f;
            --glass-bg: rgba(18, 18, 28, 0.6);
            --glass-border: rgba(255, 255, 255, 0.06);
            --neon-shadow: 0 0 15px rgba(255, 0, 60, 0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: #fff; padding: 30px 20px; }
        .admin-container { max-width: 800px; margin: 0 auto; background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-size: 2rem; font-weight: 900; margin-bottom: 25px; border-left: 5px solid var(--primary); padding-left: 15px; text-transform: uppercase; }
        h2 span { color: var(--primary); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 700; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], input[type="datetime-local"], textarea, select { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 12px; border-radius: 8px; color: #fff; outline: none; transition: 0.3s; }
        input:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: var(--neon-shadow); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .file-box { background: rgba(255,255,255,0.02); border: 1px dashed var(--glass-border); padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; position: relative; }
        .file-box input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .file-box i { font-size: 1.5rem; color: var(--primary); margin-bottom: 8px; display: block; }
        .file-box span { font-size: 0.8rem; color: #777; }
        .or-text { text-align: center; margin: 10px 0; color: #555; font-weight: bold; font-size: 0.8rem; }
        .btn-submit { width: 100%; background: var(--primary); border: none; color: #fff; padding: 15px; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; box-shadow: var(--neon-shadow); text-transform: uppercase; letter-spacing: 1px; margin-top: 15px; }
        .btn-submit:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .status-msg { text-align: center; margin-top: 15px; font-weight: 600; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2>Akiya Control <span>Portal</span></h2>
        
        <form id="gameUploadForm">
            <!-- Game Title & Category -->
            <div class="row">
                <div class="form-group">
                    <label>Game Title / Name</label>
                    <input type="text" id="gameName" placeholder="e.g., GTA V Premium Edition" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="gameCategory">
                        <option value="Action">Action</option>
                        <option value="Adventure">Adventure</option>
                        <option value="Open World">Open World</option>
                        <option value="Racing">Racing</option>
                        <option value="Shooter">Shooter</option>
                    </select>
                </div>
            </div>

            <!-- Size & Expiry Limit -->
            <div class="row">
                <div class="form-group">
                    <label>Game Size</label>
                    <input type="text" id="gameSize" placeholder="e.g., 45 GB" required>
                </div>
                <div class="form-group">
                    <label>Expiry Limit (Optional Time Limit to Auto-Hide)</label>
                    <input type="datetime-local" id="expiryTime">
                </div>
            </div>

            <!-- Description -->
            <div class="form-group">
                <label>Full Game Description</label>
                <textarea id="gameDesc" rows="4" placeholder="Explore the world and complete high-octane missions..."></textarea>
            </div>

            <!-- Image Upload & Input Box -->
            <div class="form-group">
                <label>Main Grid Thumbnail Card</label>
                <div class="file-box">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span id="fileLabel">Choose Image File (JPG/PNG)</span>
                    <input type="file" id="gameFile" accept="image/*" onchange="handleFileSelect(this, 'gameUrl')">
                </div>
                <div class="or-text">OR PASTE DIRECT URL BELOW</div>
                <input type="text" id="gameUrl" placeholder="https://example.com/poster.jpg">
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-submit" id="submitBtn"><i class="fa-solid fa-bolt"></i> Deploy Title</button>
            <div class="status-msg" id="statusMsg"></div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD1SRJ0O2OcZRYafgJ0uABolb9TgBiAA3I",
            authDomain: "akiya-gamer-zone.firebaseapp.com",
            projectId: "akiya-gamer-zone",
            storageBucket: "akiya-gamer-zone.firebasestorage.app",
            messagingSenderId: "392261776362",
            appId: "1:392261776362:web:e0b5bbfe267465af70f893",
            databaseURL: "https://akiya-gamer-zone-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // File to Base64 String converter logic (No Storage Required!)
        window.handleFileSelect = function(input, targetInputId) {
            const file = input.files[0];
            if (!file) return;
            
            document.getElementById('fileLabel').innerText = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                // කෙලින්ම image එක text string එකක් බවට හරවා text box එකට දානවා
                document.getElementById(targetInputId).value = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Form Submit Configuration
        document.getElementById('gameUploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Deploying...`;
            
            const name = document.getElementById('gameName').value;
            const category = document.getElementById('gameCategory').value;
            const size = document.getElementById('gameSize').value;
            const expiryTime = document.getElementById('expiryTime').value;
            const desc = document.getElementById('gameDesc').value;
            const imageUrl = document.getElementById('gameUrl').value || 'https://via.placeholder.com/300x400';

            // Firebase Database Object Creation
            const gamesRef = ref(database, 'games');
            const newGameRef = push(gamesRef);
            
            set(newGameRef, {
                name: name,
                title: name, // Home page එකේ fields දෙකම check කරන නිසා දෙකටම දැම්මා
                category: category,
                size: size,
                expiryTime: expiryTime ? expiryTime : null,
                desc: desc,
                image: imageUrl,
                cardImage: imageUrl
            }).then(() => {
                statusMsg.style.display = "block";
                statusMsg.style.color = "var(--secondary)";
                statusMsg.innerHTML = `<i class="fa-solid fa-circle-check"></i> Title Successfully Deployed!`;
                
                // Form එක Reset කිරීම
                document.getElementById('gameUploadForm').reset();
                document.getElementById('fileLabel').innerText = "Choose Image File (JPG/PNG)";
            }).catch((error) => {
                statusMsg.style.display = "block";
                statusMsg.style.color = "var(--primary)";
                statusMsg.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> Deployment Failed: ` + error.message;
            }).finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-bolt"></i> Deploy Title`;
            });
        });
    </script>
</body>
</html>
