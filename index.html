<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGZ Terminal | Admin Matrix Center</title>
    <link class="rounded-full" rel="icon" type="image/jpeg" href="MY GAMING SITE OFFICIAL LOGO.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #040612; color: #e2e8f0; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .terminal-glass { background: rgba(11, 13, 25, 0.8); border: 1px solid #1e293b; backdrop-filter: blur(10px); }
        .neon-border-cyan:focus { border-color: #00f0ff; box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); outline: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Dashboard Header -->
        <header class="terminal-glass rounded-xl p-6 mb-8 flex flex-col md:flex-row justify-between items-center gap-4 border-b-2 border-[#ff0055]">
            <div class="flex items-center gap-4">
                <img src="MY GAMING SITE OFFICIAL LOGO.jpg" class="w-14 h-14 rounded-lg border-2 border-[#00f0ff] object-cover">
                <div>
                    <h1 class="font-orbitron text-2xl font-bold tracking-wider text-white">AGZ CENTRAL TERMINAL</h1>
                    <p class="text-xs text-gray-400 font-mono">Status: Connected to Secure Realtime Clusters</p>
                </div>
            </div>
            <div class="flex gap-4">
                <a href="home.html" class="font-orbitron bg-slate-800 hover:bg-slate-700 text-[#00f0ff] border border-[#00f0ff] px-4 py-2 rounded font-bold text-sm transition">VIEW ARENA</a>
            </div>
        </header>

        <!-- System Adjustments Row -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- Monetization Adjuster -->
            <div class="terminal-glass p-6 rounded-xl border border-slate-800">
                <h3 class="font-orbitron text-sm font-bold text-[#00f0ff] mb-4 tracking-wider uppercase"><i class="fas fa-ad mr-2"></i> Monetization Ad-Tab Controller</h3>
                <label class="block text-xs text-gray-400 font-mono mb-2">MAXIMUM NEW-TAB POP ADS PER CLICK ON DOWNLOADS:</label>
                <div class="flex gap-3">
                    <input type="number" id="adsLimitInput" class="w-full bg-[#0d1117] border border-slate-700 rounded p-3 text-white neon-border-cyan font-mono" value="3" min="0" max="10">
                    <button onclick="updateSystemAdsLimit()" class="font-orbitron bg-[#ff0055] hover:bg-[#b3003b] text-white px-6 rounded font-bold text-sm tracking-wider transition">DEPLOY</button>
                </div>
            </div>

            <!-- Dynamic Live Notice Bar Dispatcher -->
            <div class="terminal-glass p-6 rounded-xl border border-slate-800">
                <h3 class="font-orbitron text-sm font-bold text-amber-400 mb-4 tracking-wider uppercase"><i class="fas fa-broadcast-tower mr-2"></i> Live Micro-Announcement Dispatcher</h3>
                <label class="block text-xs text-gray-400 font-mono mb-2">ALERT BAR NOTICE (SHOWN OVER DOWNLOAD BOX):</label>
                <div class="flex gap-3">
                    <input type="text" id="liveNoticeInput" class="w-full bg-[#0d1117] border border-slate-700 rounded p-3 text-white neon-border-cyan text-sm" placeholder="e.g., Extract with WinRAR v6.20+. Parts are fully interchangeable!">
                    <button onclick="dispatchLiveNoticeText()" class="font-orbitron bg-amber-500 hover:bg-amber-600 text-black px-6 rounded font-bold text-sm tracking-wider transition">DISPATCH</button>
                </div>
            </div>
        </div>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Side: App Form -->
            <div class="lg:col-span-1 terminal-glass p-6 rounded-xl border border-slate-800 h-fit">
                <h2 class="font-orbitron text-lg font-bold text-white mb-6 border-b border-slate-800 pb-2 tracking-wide text-center">GENERATE PAYLOAD CORE</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-mono text-gray-400 mb-1">TARGET COINCIDENCE SLOT CATEGORY:</label>
                        <select id="gameCategorySelect" class="w-full bg-[#0d1117] border border-slate-700 rounded p-2.5 text-white neon-border-cyan text-sm" onchange="autoFetchNextAvailableSlotIndex()">
                            <option value="Adventure">Adventure</option>
                            <option value="Racing">Racing</option>
                            <option value="Horror">Horror</option>
                            <option value="Multiplayer">Multiplayer</option>
                            <option value="Advance">Advance</option>
                            <option value="Shooter">Shooter</option>
                            <option value="Open World">Open World</option>
                            <option value="Online">Online</option>
                            <option value="Puzzle">Puzzle</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-mono text-gray-400 mb-1">TARGET DATA SLOT INDEX:</label>
                        <input type="text" id="gameSlotIdInput" class="w-full bg-[#0d1117] border border-slate-700 rounded p-2.5 text-white neon-border-cyan font-mono text-sm" placeholder="e.g., 001">
                    </div>

                    <div>
                        <label class="block text-xs font-mono text-gray-400 mb-1">GAME CORE TITLE:</label>
                        <input type="text" id="gameTitleInput" class="w-full bg-[#0d1117] border border-slate-700 rounded p-2.5 text-white neon-border-cyan text-sm">
                    </div>

                    <div>
                        <label class="block text-xs font-mono text-gray-400 mb-1">PAYLOAD COMPRESSION SIZE:</label>
                        <input type="text" id="gameSizeInput" class="w-full bg-[#0d1117] border border-slate-700 rounded p-2.5 text-white neon-border-cyan text-sm" placeholder="e.g., 45.2 GB">
                    </div>

                    <div>
                        <label class="block text-xs font-mono text-gray-400 mb-1">THUMBNAIL IMAGE CLOUD URL:</label>
                        <input type="url" id="gameImageInput" class="w-full bg-[#0d1117] border border-slate-700 rounded p-2.5 text-white neon-border-cyan text-sm">
                    </div>

                    <div>
                        <label class="block text-xs font-mono text-gray-400 mb-1">HERO BANNER BACKGROUND URL:</label>
                        <input type="url" id="gameBannerInput" class="w-full bg-[#0d1117] border border-slate-700 rounded p-2.5 text-white neon-border-cyan text-sm">
                    </div>

                    <div>
                        <label class="block text-xs font-mono text-gray-400 mb-1">TRAILER YOUTUBE LINK/ID:</label>
                        <input type="text" id="gameTrailerInput" class="w-full bg-[#0d1117] border border-slate-700 rounded p-2.5 text-white neon-border-cyan text-sm">
                    </div>

                    <div>
                        <label class="block text-xs font-mono text-gray-400 mb-1">GAME OVERVIEW / DESCRIPTION:</label>
                        <textarea id="gameDescInput" class="w-full bg-[#0d1117] border border-slate-700 rounded p-2.5 text-white neon-border-cyan text-sm h-24 resize-none"></textarea>
                    </div>

                    <!-- Setup Links Storage Matrix Arrays -->
                    <div class="border-t border-slate-800 pt-3">
                        <label class="block text-xs font-mono text-[#00f0ff] mb-2">PAYLOAD MIRROR PATH LINK ENGINES:</label>
                        <div class="space-y-2 max-h-48 overflow-y-auto pr-1" id="linksInputContainer">
                            <!-- Injected Dynamically via Script Core -->
                        </div>
                        <button onclick="addNewLinkInputRowFields()" class="w-full mt-2 bg-slate-800 hover:bg-slate-700 text-xs text-gray-300 font-mono p-2 rounded border border-slate-700 transition">+ ADD CLOUD MIRROR NODE</button>
                    </div>

                    <button onclick="commitGameMetadataToDatabase()" class="font-orbitron w-full bg-[#00f0ff] hover:bg-[#00c8d4] text-black p-3 rounded font-bold tracking-wider transition shadow-lg shadow-cyan-500/10 mt-2">WRITE TO CLUSTER DATA</button>
                </div>
            </div>

            <!-- Right Side: Analytics List -->
            <div class="lg:col-span-2 space-y-6">
                <div class="terminal-glass p-6 rounded-xl border border-slate-800">
                    <h2 class="font-orbitron text-base font-bold text-white mb-4 tracking-wide"><i class="fas fa-server text-[#ff0055] mr-2"></i> REPOSITORY DIRECTORY INDICES</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left font-mono text-xs text-gray-400">
                            <thead>
                                <tr class="border-b border-slate-800 text-gray-500">
                                    <th class="pb-3">SLOT KEY</th>
                                    <th class="pb-3">CORE IDENTITY NAME</th>
                                    <th class="pb-3 text-center">VISITS</th>
                                    <th class="pb-3 text-center">DL_COUNT</th>
                                    <th class="pb-3 text-right">OPERATIONS</th>
                                </tr>
                            </thead>
                            <tbody id="gamesTerminalTableBody">
                                <!-- Appended dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1SRJ0O2OcZRYafgJ0uABolb9TgBiAA3I",
            authDomain: "akiya-gamer-zone.firebaseapp.com",
            projectId: "akiya-gamer-zone",
            storageBucket: "akiya-gamer-zone.firebasestorage.app",
            databaseURL: "https://akiya-gamer-zone-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        window.addNewLinkInputRowFields = function(url = '', type = 'direct') {
            const container = document.getElementById('linksInputContainer');
            const row = document.createElement('div');
            row.className = 'flex gap-2 link-entry-row items-center bg-[#070913] p-2 rounded border border-slate-900';
            row.innerHTML = `
                <select class="link-type-select bg-[#0d1117] border border-slate-700 text-white rounded text-xs p-1">
                    <option value="direct" ${type==='direct'?'selected':''}>Direct</option>
                    <option value="torrent" ${type==='torrent'?'selected':''}>Torrent</option>
                    <option value="cloud" ${type==='cloud'?'selected':''}>Cloud</option>
                </select>
                <input type="url" class="link-href-input w-full bg-[#0d1117] border border-slate-700 text-white rounded text-xs p-1" value="${url}" placeholder="Mirror https:// URL...">
                <button onclick="this.parentElement.remove()" class="text-[#ff0055] text-xs px-1 hover:scale-110 transition"><i class="fas fa-trash"></i></button>
            `;
            container.appendChild(row);
        };

        window.autoFetchNextAvailableSlotIndex = function() {
            const cat = document.getElementById('gameCategorySelect').value;
            get(ref(database, 'games')).then((snap) => {
                let max = 0;
                if(snap.exists()) {
                    Object.keys(snap.val()).forEach(key => {
                        if(key.startsWith(cat + "_")) {
                            let num = parseInt(key.split('_')[1]);
                            if(num > max) max = num;
                        }
                    });
                }
                document.getElementById('gameSlotIdInput').value = String(max + 1).padStart(3, '0');
            });
        };

        window.updateSystemAdsLimit = function() {
            const val = parseInt(document.getElementById('adsLimitInput').value) || 0;
            set(ref(database, 'system_controls/maxAdsCount'), val).then(() => alert("Ad matrix configured safely."));
        };

        window.dispatchLiveNoticeText = function() {
            const txt = document.getElementById('liveNoticeInput').value.trim();
            set(ref(database, 'system_controls/downloadNoticeText'), txt).then(() => alert("Live announcement text dispatched."));
        };

        window.commitGameMetadataToDatabase = function() {
            const cat = document.getElementById('gameCategorySelect').value;
            const slot = document.getElementById('gameSlotIdInput').value.trim();
            if(!slot) { alert("Missing encryption target code index!"); return; }
            
            const targetKey = `${cat}_${slot}`;
            const linkRows = document.querySelectorAll('.link-entry-row');
            const linksArray = [];
            
            // Link array reset structure mapped to force continuous sequential iterations inside the template structure
            linkRows.forEach(row => {
                const type = row.querySelector('.link-type-select').value;
                const href = row.querySelector('.link-href-input').value.trim();
                if(href) linksArray.push({ platformType: type, href: href });
            });

            const updatedPayload = {
                name: document.getElementById('gameTitleInput').value.trim(),
                category: cat,
                size: document.getElementById('gameSizeInput').value.trim(),
                image: document.getElementById('gameImageInput').value.trim(),
                banner: document.getElementById('gameBannerInput').value.trim(),
                trailerYoutubeId: document.getElementById('gameTrailerInput').value.trim(),
                description: document.getElementById('gameDescInput').value.trim(),
                download_links: linksArray
            };

            set(ref(database, `games/${targetKey}`), updatedPayload).then(() => {
                alert(`Data structural integrity synced to target node: ${targetKey}`);
                clearAdminFormCanvas();
            });
        };

        function clearAdminFormCanvas() {
            document.getElementById('gameTitleInput').value = '';
            document.getElementById('gameSizeInput').value = '';
            document.getElementById('gameImageInput').value = '';
            document.getElementById('gameBannerInput').value = '';
            document.getElementById('gameTrailerInput').value = '';
            document.getElementById('gameDescInput').value = '';
            document.getElementById('linksInputContainer').innerHTML = '';
            autoFetchNextAvailableSlotIndex();
        }

        window.triggerTargetNodeDeletion = function(key) {
            if(confirm(`Execute total erasure protocol on node: ${key}?`)) {
                set(ref(database, `games/${key}`), null);
            }
        };

        window.editTargetClusterNode = function(key) {
            get(ref(database, `games/${key}`)).then(snap => {
                if(!snap.exists()) return;
                const g = snap.val();
                
                document.getElementById('gameCategorySelect').value = g.category || 'Adventure';
                document.getElementById('gameSlotIdInput').value = key.split('_')[1];
                document.getElementById('gameTitleInput').value = g.name || '';
                document.getElementById('gameSizeInput').value = g.size || '';
                document.getElementById('gameImageInput').value = g.image || '';
                document.getElementById('gameBannerInput').value = g.banner || '';
                document.getElementById('gameTrailerInput').value = g.trailerYoutubeId || '';
                document.getElementById('gameDescInput').value = g.description || '';
                
                const container = document.getElementById('linksInputContainer');
                container.innerHTML = '';
                if(g.download_links) {
                    g.download_links.forEach(l => addNewLinkInputRowFields(l.href, l.platformType));
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        };

        window.addEventListener('DOMContentLoaded', () => {
            autoFetchNextAvailableSlotIndex();
            
            get(ref(database, 'system_controls/maxAdsCount')).then(snap => {
                if(snap.exists()) document.getElementById('adsLimitInput').value = snap.val();
            });
            get(ref(database, 'system_controls/downloadNoticeText')).then(snap => {
                if(snap.exists()) document.getElementById('liveNoticeInput').value = snap.val();
            });

            onValue(ref(database, 'games'), (snapshot) => {
                const tbody = document.getElementById('gamesTerminalTableBody');
                tbody.innerHTML = '';
                if(!snapshot.exists()) return;
                
                Object.keys(snapshot.val()).forEach(key => {
                    const g = snapshot.val()[key];
                    const row = document.createElement('tr');
                    row.className = 'border-b border-slate-900 hover:bg-slate-900/40 transition';
                    row.innerHTML = `
                        <td class="py-3 text-[#00f0ff] font-bold">${key}</td>
                        <td class="py-3 text-white max-w-xs truncate">${g.name || 'Untitled'}</td>
                        <td class="py-3 text-center font-bold text-slate-500">${g.visitorsCount || 0}</td>
                        <td class="py-3 text-center font-bold text-emerald-500">${g.downloadsCount || 0}</td>
                        <td class="py-3 text-right space-x-2">
                            <button onclick="editTargetClusterNode('${key}')" class="text-amber-500 hover:underline"><i class="fas fa-edit"></i></button>
                            <button onclick="triggerTargetNodeDeletion('${key}')" class="text-[#ff0055] hover:underline"><i class="fas fa-trash"></i></button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            });
        });
    </script>
</body>
</html>
