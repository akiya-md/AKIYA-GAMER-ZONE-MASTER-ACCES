<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akiya Gamer Zone | Master Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff003c;
            --secondary: #00ff66;
            --bg-dark: #0a0a0f;
            --glass-bg: rgba(18, 18, 28, 0.6);
            --glass-border: rgba(255, 255, 255, 0.06);
            --neon-shadow: 0 0 15px rgba(255, 0, 60, 0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: #fff; padding: 40px 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; }
        
        /* Navigation Tabs */
        .tabs { display: flex; gap: 15px; margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .tab-btn { background: transparent; border: 1px solid var(--glass-border); color: #aaa; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; text-transform: uppercase; }
        .tab-btn.active, .tab-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: var(--neon-shadow); }
        
        .panel-section { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 30px; border-radius: 16px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .panel-section.active { display: block; }
        
        h2 { font-size: 1.8rem; font-weight: 900; margin-bottom: 25px; border-left: 5px solid var(--primary); padding-left: 15px; text-transform: uppercase; }
        h2 span { color: var(--primary); }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 700; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], input[type="datetime-local"], textarea, select { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); padding: 12px; border-radius: 8px; color: #fff; outline: none; transition: 0.3s; }
        input:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: var(--neon-shadow); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .btn-submit { width: 100%; background: var(--primary); border: none; color: #fff; padding: 15px; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; box-shadow: var(--neon-shadow); text-transform: uppercase; margin-top: 15px; }
        .btn-submit:hover { filter: brightness(1.2); transform: translateY(-2px); }
        
        /* Games Management List */
        .item-list { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        .list-item { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .item-info { display: flex; align-items: center; gap: 15px; }
        .item-info img { width: 50px; height: 60px; object-fit: cover; border-radius: 6px; border: 1px solid var(--glass-border); }
        .item-details h4 { font-size: 1rem; font-weight: 700; }
        .item-details p { font-size: 0.8rem; color: #777; }
        .btn-delete { background: #ff3333; border: none; color: #fff; padding: 8px 16px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-delete:hover { background: #ff0000; box-shadow: 0 0 10px rgba(255,0,0,0.5); }
        
        .status-msg { text-align: center; margin-top: 15px; font-weight: 600; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="admin-container">
        <!-- Control Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('addGameSection', this)"><i class="fa-solid fa-gamepad"></i> Add Game</button>
            <button class="tab-btn" onclick="switchTab('manageGamesSection', this); loadGamesList();"><i class="fa-solid fa-list-check"></i> Manage Games</button>
            <button class="tab-btn" onclick="switchTab('sliderSection', this)"><i class="fa-solid fa-images"></i> Slider Banners</button>
        </div>

        <!-- SECTION 1: ADD GAME -->
        <div class="panel-section active" id="addGameSection">
            <h2>Deploy New <span>Game Title</span></h2>
            <form id="gameForm">
                <div class="row">
                    <div class="form-group">
                        <label>Game Title</label>
                        <input type="text" id="gameName" placeholder="e.g., Forza Horizon 4" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="gameCategory">
                            <option value="Action">Action</option>
                            <option value="Racing">Racing</option>
                            <option value="Open World">Open World</option>
                            <option value="Adventure">Adventure</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Game Size</label>
                        <input type="text" id="gameSize" placeholder="e.g., 66.6 GB" required>
                    </div>
                    <div class="form-group">
                        <label>Auto-Hide Date/Time (Optional)</label>
                        <input type="datetime-local" id="expiryTime">
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="gameDesc" rows="3" placeholder="Game features and info..."></textarea>
                </div>
                <div class="form-group">
                    <label>Game Image URL</label>
                    <input type="text" id="gameUrl" placeholder="Paste direct image link (e.g., https://site.com/image.jpg)" required>
                </div>
                <button type="submit" class="btn-submit" id="gameSubBtn"><i class="fa-solid fa-bolt"></i> Deploy Game</button>
                <div class="status-msg" id="gameStatus"></div>
            </form>
        </div>

        <!-- SECTION 2: MANAGE & DELETE GAMES -->
        <div class="panel-section" id="manageGamesSection">
            <h2>Active Deployed <span>Titles</span></h2>
            <div class="item-list" id="activeGamesList">
                <p style="color:#555;">Loading deployed core clusters...</p>
            </div>
        </div>

        <!-- SECTION 3: SLIDER BANNERS -->
        <div class="panel-section" id="sliderSection">
            <h2>Add Slider <span>Trending Banners</span></h2>
            <form id="sliderForm">
                <div class="form-group">
                    <label>Banner Big Title</label>
                    <input type="text" id="slideTitle" placeholder="e.g., GTA VI COMING SOON" required>
                </div>
                <div class="form-group">
                    <label>Short Description</label>
                    <input type="text" id="slideDesc" placeholder="Description...">
                </div>
                <div class="form-group">
                    <label>Download Meta Text</label>
                    <input type="text" id="slideMeta" placeholder="e.g., 📥 Fast Download" value="📥 Fast Download">
                </div>
                <div class="form-group">
                    <label>Banner Wallpaper URL</label>
                    <input type="text" id="slideUrl" placeholder="Paste background image link..." required>
                </div>
                <button type="submit" class="btn-submit" id="slideSubBtn"><i class="fa-solid fa-fire"></i> Add to Slider</button>
                <div class="status-msg" id="slideStatus"></div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1SRJ0O2OcZRYafgJ0uABolb9TgBiAA3I",
            authDomain: "akiya-gamer-zone.firebaseapp.com",
            projectId: "akiya-gamer-zone",
            storageBucket: "akiya-gamer-zone.firebasestorage.app",
            messagingSenderId: "392261776362",
            appId: "1:392261776362:web:e0b5bbfe267465af70f893",
            databaseURL: "https://akiya-gamer-zone-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // --- Tab Switcher ---
        window.switchTab = function(sectionId, btn) {
            document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            btn.classList.add('active');
        }

        // --- SUBMIT GAME ---
        document.getElementById('gameForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('gameSubBtn');
            const status = document.getElementById('gameStatus');
            btn.disabled = true;

            const name = document.getElementById('gameName').value;
            const category = document.getElementById('gameCategory').value;
            const size = document.getElementById('gameSize').value;
            const expiryTime = document.getElementById('expiryTime').value;
            const desc = document.getElementById('gameDesc').value;
            const imgUrl = document.getElementById('gameUrl').value;

            const newRef = push(ref(database, 'games'));
            set(newRef, {
                name, title: name, category, size,
                expiryTime: expiryTime ? expiryTime : null,
                desc, image: imgUrl, cardImage: imgUrl
            }).then(() => {
                status.innerHTML = `<span style="color:var(--secondary)">Game Deployed Successfully!</span>`;
                document.getElementById('gameForm').reset();
            }).finally(() => btn.disabled = false);
        });

        // --- LOAD & DELETE GAMES MANAGEMENT ---
        window.loadGamesList = function() {
            const listDiv = document.getElementById('activeGamesList');
            onValue(ref(database, 'games'), (snapshot) => {
                listDiv.innerHTML = "";
                if(!snapshot.exists()) {
                    listDiv.innerHTML = "<p>No active games found inside core clusters.</p>";
                    return;
                }
                snapshot.forEach(child => {
                    const id = child.key;
                    const game = child.val();
                    listDiv.innerHTML += `
                        <div class="list-item">
                            <div class="item-info">
                                <img src="${game.image}">
                                <div class="item-details">
                                    <h4>${game.name || game.title}</h4>
                                    <p>${game.category} | ${game.size}</p>
                                </div>
                            </div>
                            <button class="btn-delete" onclick="deleteGame('${id}')"><i class="fa-solid fa-trash"></i> Delete</button>
                        </div>
                    `;
                });
            });
        }

        window.deleteGame = function(id) {
            if(confirm("Are you sure you want to completely wipe this title?")) {
                remove(ref(database, `games/${id}`));
            }
        }

        // --- SUBMIT SLIDER BANNER ---
        document.getElementById('sliderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('slideSubBtn');
            const status = document.getElementById('slideStatus');
            btn.disabled = true;

            const title = document.getElementById('slideTitle').value;
            const desc = document.getElementById('slideDesc').value;
            const downloads = document.getElementById('slideMeta').value;
            const image = document.getElementById('slideUrl').value;

            const newRef = push(ref(database, 'trendingBanners'));
            set(newRef, { title, desc, downloads, image })
            .then(() => {
                status.innerHTML = `<span style="color:var(--secondary)">Banner Added to Home Slider!</span>`;
                document.getElementById('sliderForm').reset();
            }).finally(() => btn.disabled = false);
        });
    </script>
</body>
</html>
