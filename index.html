<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akiya Control HQ - Dashboard</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1SRJ0O2OcZRYafgJ0uABolb9TgBiAA3I",
            authDomain: "akiya-gamer-zone.firebaseapp.com",
            projectId: "akiya-gamer-zone",
            storageBucket: "akiya-gamer-zone.firebasestorage.app",
            messagingSenderId: "392261776362",
            appId: "1:392261776362:web:e0b5bbfe267465af70f893",
            databaseURL: "https://akiya-gamer-zone-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        const SECRET_ADMIN_PASSWORD = "Akiya@123"; 

        window.adminLogin = function() {
            const inputPassword = document.getElementById('hqPasswordInput').value;
            if (inputPassword === SECRET_ADMIN_PASSWORD) {
                signInWithPopup(auth, provider).then(() => {
                    alert("✅ Welcome Back, Admin!");
                }).catch(err => alert("Google Auth Error: " + err.message));
            } else {
                alert("❌ Incorrect Password!");
            }
        }

        window.adminLogout = function() {
            signOut(auth).then(() => {
                document.getElementById('hqPasswordInput').value = "";
                alert("🔒 Logged Out Safely.");
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginGate').style.display = 'none';
                document.getElementById('adminPanelCore').style.display = 'grid';
                document.getElementById('adminName').innerText = user.displayName;
                document.getElementById('adminAvatar').src = user.photoURL;
            } else {
                document.getElementById('loginGate').style.display = 'flex';
                document.getElementById('adminPanelCore').style.display = 'none';
            }
        });

        onValue(ref(database, 'status/usersOnline'), (snapshot) => {
            const count = snapshot.val() || 0;
            document.getElementById('liveVisitorsCount').innerText = count;
        });

        onValue(ref(database, 'usersLog'), (snapshot) => {
            const listContainer = document.getElementById('activeUsersList');
            if(!listContainer) return;
            listContainer.innerHTML = "";
            let userCount = 0;
            snapshot.forEach((child) => {
                const userData = child.val();
                userCount++;
                listContainer.innerHTML += `
                    <div class="user-log-card">
                        <img src="${userData.photo || 'https://via.placeholder.com/32'}" alt="dp">
                        <div>
                            <div style="font-weight:700; font-size:0.8rem;">${userData.name}</div>
                            <div style="font-size:0.7rem; color:#888;">${userData.email}</div>
                        </div>
                    </div>
                `;
            });
            initAnalyticsChart(userCount);
        });

        onValue(ref(database, 'games'), (snapshot) => {
            const managementContainer = document.getElementById('deployedGamesManagementList');
            if(!managementContainer) return;
            managementContainer.innerHTML = "";
            const data = snapshot.val();
            
            if (!data) {
                managementContainer.innerHTML = `<div style="color:var(--muted); font-size:0.85rem; padding:10px;">No games added yet.</div>`;
                return;
            }

            Object.keys(data).forEach((key) => {
                const game = data[key];
                const gTitle = game.name || game.title || 'Unknown Game';
                const gSize = game.size || 'N/A';
                managementContainer.innerHTML += `
                    <div class="manage-game-card">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <img src="${game.image || 'https://via.placeholder.com/50'}" style="width:45px; height:45px; border-radius:6px; object-fit:cover;">
                            <div>
                                <div style="font-weight:700; font-size:0.9rem; color:#fff;">${gTitle}</div>
                                <div style="font-size:0.75rem; color:var(--secondary);">Size: ${gSize}</div>
                            </div>
                        </div>
                        <button class="delete-node-btn" onclick="deleteGameNode('${key}', '${gTitle.replace(/'/g, "\\'")}')">Remove Game</button>
                    </div>
                `;
            });
        });

        window.deleteGameNode = function(gameId, gameTitle) {
            if (confirm(`⚠️ Delete "${gameTitle}" permanently?`)) {
                set(ref(database, 'games/' + gameId), null).then(() => alert("✅ Deleted successfully."));
            }
        };

        async function handleFileUpload(fileInputId, progressBarId) {
            const fileInput = document.getElementById(fileInputId);
            const progressBar = document.getElementById(progressBarId);
            if (!fileInput || !fileInput.files[0]) return null;

            const file = fileInput.files[0];
            const storageReference = sRef(storage, `game_payloads/${Date.now()}_${file.name}`);
            progressBar.style.width = "50%";
            
            try {
                const snapshot = await uploadBytes(storageReference, file);
                const downloadURL = await getDownloadURL(snapshot.ref);
                progressBar.style.width = "100%";
                progressBar.style.background = "var(--secondary)";
                return downloadURL;
            } catch (error) {
                alert("Upload Failed: " + error.message);
                return null;
            }
        }

        window.saveTrendingBanners = async function() {
            const btn = document.getElementById('btnBannerSync');
            btn.innerText = "Processing...";
            let finalImageUrl = document.getElementById('bImgUrl').value;
            const fileUrl = await handleFileUpload('bImgFile', 'pBarBanner');
            if (fileUrl) finalImageUrl = fileUrl;

            set(ref(database, 'trendingBanners/' + document.getElementById('bannerSlotSelect').value), {
                title: document.getElementById('bTitle').value,
                downloads: document.getElementById('bDownloads').value,
                desc: document.getElementById('bDesc').value,
                image: finalImageUrl
            }).then(() => {
                btn.innerText = "Save Banner";
                alert("🎯 Slider updated successfully!");
            });
        }

        window.publishGameCard = async function() {
            const btn = document.getElementById('btnGameDeploy');
            btn.innerText = "Uploading Images & Deploying...";

            const cardImg = await handleFileUpload('gCardImgFile', 'pBarCard') || document.getElementById('gCardImgUrl').value;
            const mainImg = await handleFileUpload('gMainImgFile', 'pBarMain') || document.getElementById('gMainImgUrl').value;
            const bgBanner = await handleFileUpload('gBgBannerFile', 'pBarBg') || document.getElementById('gBgBannerUrl').value;

            const ss1 = await handleFileUpload('gSs1File', 'pBarS1') || document.getElementById('gSs1Url').value;
            const ss2 = await handleFileUpload('gSs2File', 'pBarS2') || document.getElementById('gSs2Url').value;
            const ss3 = await handleFileUpload('gSs3File', 'pBarS3') || document.getElementById('gSs3Url').value;

            const gameData = {
                name: document.getElementById('gTitle').value,
                title: document.getElementById('gTitle').value,
                size: document.getElementById('gSize').value,
                category: document.getElementById('gCategory').value,
                status: "ACTIVE",
                specialNotice: document.getElementById('gNotice').value,
                description: document.getElementById('gDescription').value,
                image: cardImg,
                cardImage: cardImg,
                mainImage: mainImg,
                bgBanner: bgBanner,
                screenshots: [ss1, ss2, ss3],
                links: {
                    torrent: document.getElementById('t_links').value,
                    direct: document.getElementById('d_links').value,
                    mirror: document.getElementById('m_links').value
                }
            };

            push(ref(database, 'games'), gameData).then(() => {
                btn.innerText = "Add New Game to Site";
                alert("🚀 Game Added Successfully!");
            });
        }

        let myChart = null;
        function initAnalyticsChart(registeredUsers) {
            const canvas = document.getElementById('userAnalyticsChart');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            if(myChart) { myChart.destroy(); }
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Live Visitors', 'Total Users'],
                    datasets: [{
                        label: 'Traffic Summary',
                        data: [parseInt(document.getElementById('liveVisitorsCount').innerText) || 1, registeredUsers],
                        backgroundColor: ['rgba(0,255,102,0.2)'],
                        borderColor: ['#00ff66'],
                        borderWidth: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>

    <style>
        :root {
            --primary: #ff003c;
            --secondary: #00ff66;
            --bg-dark: #0a0a0f;
            --glass-bg: rgba(18, 18, 28, 0.8);
            --glass-border: rgba(255, 255, 255, 0.08);
            --muted: #888899;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: #fff; min-height: 100vh; }
        .gate-container { position: fixed; top:0; left:0; width:100%; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; z-index: 9999; }
        .gate-card { background: #11111e; padding: 40px; border-radius: 12px; border: 1px solid var(--primary); text-align: center; max-width: 400px; width: 100%; }
        .panel-input { background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); padding: 12px; border-radius: 6px; color: #fff; width: 100%; margin-top: 15px; text-align: center; }
        .gate-btn { background: var(--primary); color:#fff; border:none; padding:12px; width:100%; border-radius:6px; cursor:pointer; font-weight:700; margin-top:15px; }
        .admin-wrapper { display: grid; grid-template-columns: 300px 1fr; min-height: 100vh; }
        sidebar { background: #0d0d16; border-right: 1px solid var(--glass-border); padding: 25px; display: flex; flex-direction: column; justify-content: space-between; }
        .panel-brand { font-size: 1.2rem; font-weight: 900; }
        .panel-brand span { color: var(--primary); }
        .operator-card { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; margin: 20px 0; display: flex; align-items: center; gap: 12px; border: 1px solid var(--glass-border); }
        .operator-card img { width: 40px; height: 40px; border-radius: 50%; }
        .logout-trigger-btn { width: 100%; background: rgba(255, 0, 60, 0.1); border: 1px solid var(--primary); color: var(--primary); padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 700; }
        main { padding: 40px; overflow-y: auto; }
        .analytics-matrix-grid { display: grid; grid-template-columns: 240px 1fr; gap: 24px; margin-bottom: 35px; }
        .counter-neon-box { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 25px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .counter-value { font-size: 3rem; font-weight: 900; color: var(--secondary); }
        .chart-container-wrapper { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 20px; border-radius: 12px; height: 180px; }
        .section-panel { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 25px; border-radius: 12px; margin-bottom: 35px; }
        .section-title { font-size: 1rem; font-weight: 700; color: var(--secondary); margin-bottom: 20px; border-left: 4px solid var(--secondary); padding-left: 10px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full-width { grid-column: 1 / -1; }
        label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; font-weight: 700; }
        input, select, textarea { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 12px; border-radius: 6px; color: #fff; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--secondary); }
        .media-input-wrapper { background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.1); padding: 12px; border-radius: 6px; display: flex; flex-direction: column; gap: 8px; }
        .upload-progress-micro-bar { width: 0%; height: 3px; background: var(--primary); transition: width 0.4s; }
        .action-submit-btn { background: var(--secondary); color: #000; border: none; padding: 12px 25px; font-weight: 700; border-radius: 6px; cursor: pointer; margin-top: 15px; }
        .user-log-card { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; margin-bottom: 8px; border: 1px solid var(--glass-border); }
        .user-log-card img { width: 30px; height: 30px; border-radius: 50%; }
        .manage-game-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--glass-border); }
        .delete-node-btn { background: rgba(255, 0, 60, 0.15); border: 1px solid var(--primary); color: #ff4d6d; padding: 6px 12px; font-weight: 700; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="gate-container" id="loginGate">
        <div class="gate-card">
            <h2>HQ LOGIN</h2>
            <input type="password" id="hqPasswordInput" class="panel-input" placeholder="Enter Password">
            <button class="gate-btn" onclick="adminLogin()">Sign In</button>
        </div>
    </div>

    <div class="admin-wrapper" id="adminPanelCore" style="display:none;">
        <sidebar>
            <div>
                <div class="panel-brand">Akiya Core <span>HQ</span></div>
                <div class="operator-card">
                    <img src="" id="adminAvatar" alt="avatar">
                    <div>
                        <div style="font-size:0.65rem; color:var(--muted);">Welcome</div>
                        <div id="adminName" style="font-weight:700; color:var(--secondary);">---</div>
                    </div>
                </div>
                <div style="font-size:0.75rem; font-weight:700; color:var(--muted); margin-bottom:10px;">Registered Users</div>
                <div id="activeUsersList" style="max-height: 350px; overflow-y: auto;"></div>
            </div>
            <button class="logout-trigger-btn" onclick="adminLogout()">Logout</button>
        </sidebar>

        <main>
            <div class="analytics-matrix-grid" data-aos="fade-up">
                <div class="counter-neon-box">
                    <div style="font-size:0.8rem; color:var(--muted);">Live Visitors</div>
                    <div class="counter-value" id="liveVisitorsCount">0</div>
                </div>
                <div class="chart-container-wrapper">
                    <canvas id="userAnalyticsChart"></canvas>
                </div>
            </div>

            <!-- Slider Management -->
            <div class="section-panel" data-aos="fade-up">
                <div class="section-title">Edit Homepage Slides / Banner</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Select Slide Slot</label>
                        <select id="bannerSlotSelect">
                            <option value="slide_01">Slot 1 (Main Feature)</option>
                            <option value="slide_02">Slot 2</option>
                            <option value="slide_03">Slot 3</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Game Title</label>
                        <input type="text" id="bTitle" placeholder="e.g. GTA VI">
                    </div>
                    <div class="form-group">
                        <label>Download Count / Label Text</label>
                        <input type="text" id="bDownloads" placeholder="e.g. 📥 2.5M+ Downloads">
                    </div>
                    <div class="form-group full-width">
                        <label>Banner Image</label>
                        <div class="media-input-wrapper">
                            <input type="file" id="bImgFile" accept="image/*">
                            <div class="upload-progress-micro-bar" id="pBarBanner"></div>
                            <input type="text" id="bImgUrl" placeholder="Or paste image URL here...">
                        </div>
                    </div>
                    <div class="form-group full-width">
                        <label>Short Description</label>
                        <textarea id="bDesc" rows="2" placeholder="Brief description..."></textarea>
                    </div>
                </div>
                <button class="action-submit-btn" id="btnBannerSync" onclick="saveTrendingBanners()">Save Banner</button>
            </div>

            <!-- Add Games -->
            <div class="section-panel" data-aos="fade-up">
                <div class="section-title">Add New Game Entry</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Game Title</label>
                        <input type="text" id="gTitle" placeholder="Game Name">
                    </div>
                    <div class="form-group">
                        <label>Game File Size</label>
                        <input type="text" id="gSize" placeholder="e.g. 45 GB">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="gCategory">
                            <option value="action">Action Games</option>
                            <option value="openworld">Open World</option>
                            <option value="sports">Sports</option>
                            <option value="horror">Horror</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Special Urgent Notice (Optional)</label>
                        <input type="text" id="gNotice" placeholder="Important info or alert for users">
                    </div>
                    <div class="form-group full-width">
                        <label>Full Game Description</label>
                        <textarea id="gDescription" rows="4" placeholder="Enter complete game specs/details..."></textarea>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Main Grid Thumbnail Card</label>
                        <div class="media-input-wrapper"><input type="file" id="gCardImgFile" accept="image/*"><div class="upload-progress-micro-bar" id="pBarCard"></div><input type="text" id="gCardImgUrl" placeholder="URL"></div>
                    </div>
                    <div class="form-group">
                        <label>Detail Page Small Banner Thumbnail</label>
                        <div class="media-input-wrapper"><input type="file" id="gMainImgFile" accept="image/*"><div class="upload-progress-micro-bar" id="pBarMain"></div><input type="text" id="gMainImgUrl" placeholder="URL"></div>
                    </div>
                    <div class="form-group">
                        <label>Detail Page Main Background Image</label>
                        <div class="media-input-wrapper"><input type="file" id="gBgBannerFile" accept="image/*"><div class="upload-progress-micro-bar" id="pBarBg"></div><input type="text" id="gBgBannerUrl" placeholder="URL"></div>
                    </div>
                </div>

                <div style="margin-top:20px;" class="form-group"><label>Torrent Link</label><input type="text" id="t_links"></div>
                <div style="margin-top:10px;" class="form-group"><label>Direct Download Link</label><input type="text" id="d_links"></div>
                <div style="margin-top:10px;" class="form-group"><label>Mirror Link</label><input type="text" id="m_links"></div>

                <button class="action-submit-btn" id="btnGameDeploy" onclick="publishGameCard()">Add New Game to Site</button>
            </div>

            <!-- Game Manager -->
            <div class="section-panel" data-aos="fade-up">
                <div class="section-title">Manage Added Games</div>
                <div id="deployedGamesManagementList" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
        </main>
    </div>

    <script>AOS.init({ once: true });</script>
</body>
</html>
